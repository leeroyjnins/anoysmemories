<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/icon.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anoy's Memory Gallery</title>

  <!-- SEO & social sharing -->
  <meta name="description" content="A digital memory wall celebrating Anoy — share your favourite photos and videos." />
  <meta property="og:title" content="Anoy's Memory Gallery" />
  <meta property="og:description" content="A digital memory wall celebrating Anoy — share your favourite photos and videos." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icon.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Anoy's Memory Gallery" />
  <meta name="twitter:description" content="A digital memory wall celebrating Anoy — share your favourite photos and videos." />

  <!-- Preconnect so DNS + TLS are ready before the font CSS fires -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!--
    Non-render-blocking Google Fonts:
    Load as print media, then swap to 'all' once the sheet arrives.
    <noscript> fallback covers the rare no-JS case.
  -->
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
